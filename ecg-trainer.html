.hint-box { padding:11px 14px; background:#ffc8400d; border:1px solid #ffc84044; border-radius:10px; font-size:11px; color:#ffc840; margin-bottom:10px; line-height:1.7; }
.result-box { padding:12px 14px; border:1px solid; border-radius:10px; margin-bottom:10px; }

.result-page { text-align:center; }
.mini-stat { background:#091522; border:1px solid; border-radius:10px; padding:8px 16px; text-align:center; }
.history-list { width:100%; max-width:520px; max-height:45vh; overflow-y:auto; margin-bottom:22px; }
.history-item { display:flex; align-items:center; gap:10px; padding:9px 14px; background:#091522; border-radius:8px; margin-bottom:5px; border:1px solid; }
.btn-outline-accent { padding:11px 20px; background:transparent; border:1px solid #00c8f844; border-radius:22px; color:#00c8f8; cursor:pointer; font-family:inherit; font-size:11px; }
.btn-outline-dim { padding:11px 20px; background:transparent; border:1px solid #122030; border-radius:22px; color:#4a6888; cursor:pointer; font-family:inherit; font-size:11px; }
.btn-primary { padding:11px 24px; background:linear-gradient(130deg,#00c8f8,#0060cc); border:none; border-radius:22px; color:#000; font-weight:900; cursor:pointer; font-family:inherit; font-size:12px; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:#091522; }
::-webkit-scrollbar-thumb { background:#122030; border-radius:2px; }

<body>
  <div id="app"></div>
  <script>
var BL = 60; // baseline Y
var s = (v) => Math.max(18, Math.min(102, v)); // safe clamp

// Cubic Bézier arc: smooth hill/valley through (x0,y0) → peak (xp,yp) → (x1,y1)
var arc = (x0,y0,xp,yp,x1,y1) => {
  var cp = 0.52; // control point tension
  return `C ${x0+(xp-x0)*cp} ${y0},${xp-(x1-x0)*0.14} ${yp},${xp} ${yp} C ${xp+(x1-xp)*0.14} ${yp},${x1-(xp-x0)*cp} ${y1},${x1} ${y1} `;
};

// ── Primitives ──────────────────────────────────────────────────────────────

// P wave: smooth bell, width ~18px
var P  = (x, h=9)  => `L ${x} ${BL} ` + arc(x,BL, x+9,s(BL-h), x+18,BL);
// Inverted P (retrograde)
var Pi = (x, h=7)  => `L ${x} ${BL} ` + arc(x,BL, x+9,s(BL+h), x+18,BL);
// Isoelectric segment
var iso = (x, len=20, dy=0) => `L ${x} ${s(BL+dy)} L ${x+len} ${s(BL+dy)} `;

// Normal narrow QRS (~18px wide): tiny Q → tall R → small S
var QRS = (x, r=32, q=4, ss=6) =>
  `L ${x} ${BL} L ${x+3} ${s(BL+q)} L ${x+8} ${s(BL-r)} L ${x+14} ${s(BL+ss)} L ${x+18} ${BL} `;

// Wide QRS (~32px): slurred broad deflection
var wQRS = (x, r=28, inv=false) => {
  var d = inv ? -1 : 1;
  return `L ${x} ${BL} L ${x+5} ${s(BL+6*d)} L ${x+14} ${s(BL-r*d)} L ${x+24} ${s(BL+8*d)} L ${x+32} ${BL} `;
};

// RBBB: rSR' (rabbit ears) ~26px
var rbbbQRS = (x) => {
  var r1=s(BL-24), sv=s(BL+7), r2=s(BL-18);
  return `L ${x} ${BL} ` +
    arc(x,BL, x+5,r1, x+9,s(BL-6)) +
    `L ${x+11} ${sv} ` +
    arc(x+11,sv, x+16,r2, x+20,s(BL-4)) +
    `L ${x+24} ${BL} `;
};

// LBBB: broad monophasic R, no Q, ~28px
var lbbbQRS = (x) => {
  var pk = s(BL-28);
  return `L ${x} ${BL} ` + arc(x,BL, x+9,pk, x+14,pk) + arc(x+14,pk, x+20,pk, x+28,BL);
};

// WPW: delta slope then R spike then S ~26px
var wpwQRS = (x) => {
  var yd=s(BL-10), yR=s(BL-28), yS=s(BL+7);
  return `L ${x} ${BL} ` + arc(x,BL, x+5,yd, x+9,s(BL-20)) + `L ${x+13} ${yR} L ${x+19} ${yS} L ${x+26} ${BL} `;
};

// T wave: smooth bell, width ~28px
var T  = (x, h=13, neg=false) => arc(x,BL, x+14,s(BL+(neg?h:-h)), x+28,BL);
// ST segment (flat, elevated +, depressed -)
var ST = (x, len=20, elev=0)  => `L ${x} ${s(BL-elev)} L ${x+len} ${s(BL-elev)} `;

// ── Full Rhythm Generators ───────────────────────────────────────────────────
// Each returns a path string for viewBox "0 0 800 120"

var ECG_SHAPES = {

  sinus: (rr=180) => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x)+iso(x+18,20)+QRS(x+38)+ST(x+56,18)+T(x+74)+`L ${Math.min(x+rr,800)} ${BL} `; x+=rr; }
    return d;
  },

  tachy_sinus: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x,10)+iso(x+18,10)+QRS(x+28,30)+ST(x+46,8)+T(x+54,12)+`L ${Math.min(x+106,800)} ${BL} `; x+=106; }
    return d;
  },

  brady_sinus: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x)+iso(x+18,20)+QRS(x+38)+ST(x+56,22)+T(x+78)+`L ${Math.min(x+268,800)} ${BL} `; x+=268; }
    return d;
  },

  fa: () => {
    var rrs=[70,58,88,74,62,72,56,80,66,84,61];
    let d=`M 0 ${BL}`, x=0, ci=0;
    while(x<800){
      var rr=rrs[ci%rrs.length];
      // fibrillatory baseline with small irregular humps
      for(let i=0;i<rr-24;i+=6){
        var ny=BL+Math.sin(x*0.6+i*1.3)*3.5+Math.cos(x*1.2+i*0.7)*2;
        d+=`L ${x+i} ${s(ny,52,68)} `;
      }
      d+=QRS(x+rr-20,32,4,6)+`L ${Math.min(x+rr,800)} ${BL} `;
      x+=rr; ci++;
    }
    return d;
  },

  flutter: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      // 4 flutter waves (sawtooth via Bézier)
      for(let i=0;i<4;i++){
        var fx=x+i*22;
        d+=`L ${fx} ${BL} `+arc(fx,BL, fx+11,s(BL-12), fx+21,s(BL+6));
      }
      d+=QRS(x+88,32,3,5)+`L ${Math.min(x+186,800)} ${BL} `; x+=186;
    }
    return d;
  },

  bav1: () => {
    let d=`M 0 ${BL}`, x=0;
    // PR = ~50ms (very long)
    while(x<800){ d+=P(x)+iso(x+18,38)+QRS(x+56)+ST(x+74,20)+T(x+94)+`L ${Math.min(x+194,800)} ${BL} `; x+=194; }
    return d;
  },

  bav2m1: () => {
    // Wenckebach: PR progressively longer, then dropped beat
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      var prs=[18,26,36]; // increasing PR
      for(var pr of prs){
        if(x>=800) break;
        d+=P(x)+iso(x+18,pr)+QRS(x+18+pr)+ST(x+36+pr,18)+T(x+54+pr)+`L ${Math.min(x+pr+105,800)} ${BL} `;
        x+=pr+105;
      }
      if(x>=800) break;
      // blocked P — no QRS
      d+=P(x)+`L ${Math.min(x+115,800)} ${BL} `; x+=115;
    }
    return d;
  },

  bav2m2: () => {
    // Mobitz II: constant PR, sudden dropped beat
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      for(let i=0;i<3;i++){
        if(x>=800) break;
        d+=P(x)+iso(x+18,22)+QRS(x+40)+ST(x+58,18)+T(x+76)+`L ${Math.min(x+148,800)} ${BL} `; x+=148;
      }
      if(x>=800) break;
      d+=P(x)+`L ${Math.min(x+118,800)} ${BL} `; x+=118;
    }
    return d;
  },

  bav3: () => {
    // Complete AV block: P at 88px, escape QRS at 160px, fully independent
    let d=`M 0 ${BL} `;
    var pPos =[10,98,186,274,362,450,538,626,714];
    var qPos =[80,240,400,560,720];
    var all=[...pPos.map(p=>({x:p,t:'p'})),...qPos.map(q=>({x:q,t:'q'}))].sort((a,b)=>a.x-b.x);
    for(var ev of all){
      d+=`L ${ev.x} ${BL} `;
      if(ev.t==='p') d+=P(ev.x,8).replace(`L ${ev.x} ${BL} `,'');
      else d+=wQRS(ev.x,24)+ST(ev.x+32,16)+T(ev.x+48,11);
    }
    return d+`L 800 ${BL} `;
  },

  vt: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=`L ${x} ${BL} `+wQRS(x,26)+T(x+32,12,true)+`L ${Math.min(x+64,800)} ${BL} `; x+=64; }
    return d;
  },

  vf: () => {
    var amps=[22,-26,18,-22,28,-17,24,-30,19,-23,26,-20,30,-24];
    let d=`M 0 ${BL}`, x=0, ai=0;
    while(x<800){
      var w=13+(ai%4)*3, a=amps[ai%amps.length];
      d+=arc(x,BL, x+w/2,s(BL+a), x+w,BL); x+=w; ai++;
    }
    return d;
  },

  wpw: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x)+iso(x+18,8)+wpwQRS(x+26)+T(x+52,13,true)+`L ${Math.min(x+172,800)} ${BL} `; x+=172; }
    return d;
  },

  rbbb: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x)+iso(x+18,18)+rbbbQRS(x+36)+T(x+60,10,true)+`L ${Math.min(x+176,800)} ${BL} `; x+=176; }
    return d;
  },

  lbbb: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=P(x)+iso(x+18,18)+lbbbQRS(x+36)+`L ${x+64} ${BL} `+T(x+64,14,true)+`L ${Math.min(x+176,800)} ${BL} `; x+=176; }
    return d;
  },

  svt: () => {
    // No visible P before QRS (or buried in T); retrograde P in ST
    let d=`M 0 ${BL}`, x=0;
    while(x<800){ d+=QRS(x,28,3,5)+iso(x+18,8)+Pi(x+26,5)+T(x+44,10)+`L ${Math.min(x+86,800)} ${BL} `; x+=86; }
    return d;
  },

  jonctionnel: () => {
    let d=`M 0 ${BL}`, x=0;
    // Inverted P just before QRS
    while(x<800){ d+=Pi(x,8)+QRS(x+18,26,3,5)+ST(x+36,22)+T(x+58,11)+`L ${Math.min(x+232,800)} ${BL} `; x+=232; }
    return d;
  },

  // ── Ischémie ───────────────────────────────────────────────────────────────

  stemi_ant: () => {
    // Tombstone QRS + convex (domed) ST elevation
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=P(x)+iso(x+18,18);
      // QRS: tiny q, tall R, tiny s
      d+=`L ${x+36} ${BL} L ${x+39} ${s(BL+4)} L ${x+43} ${s(BL-32)} L ${x+49} ${s(BL+6)} L ${x+53} ${BL} `;
      // Convex ST (domed) + tall T  
      var jy=s(BL-18);
      d+=`L ${x+53} ${jy} `+arc(x+53,jy, x+70,s(BL-24), x+87,jy)+T(x+87,19)+`L ${Math.min(x+196,800)} ${BL} `;
      x+=196;
    }
    return d;
  },

  stemi_inf: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=P(x)+iso(x+18,18)+QRS(x+36,30,3,5);
      var sy=s(BL-15); d+=`L ${x+54} ${sy} L ${x+76} ${sy} `+T(x+76,17)+`L ${Math.min(x+186,800)} ${BL} `;
      x+=186;
    }
    return d;
  },

  stemi_inf_mirror: () => {
    // Reciprocal (mirror) changes: ST depression + upright T→inverted
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=P(x,6)+iso(x+18,18)+QRS(x+36,26,3,4);
      var sy=s(BL+13); d+=`L ${x+54} ${sy} L ${x+74} ${sy} `+T(x+74,12,true)+`L ${Math.min(x+182,800)} ${BL} `;
      x+=182;
    }
    return d;
  },

  stemi_lat: () => {
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=P(x)+iso(x+18,18);
      d+=`L ${x+36} ${BL} L ${x+39} ${s(BL-28)} L ${x+45} ${s(BL+6)} L ${x+49} ${BL} `;
      var sy=s(BL-14);
      d+=`L ${x+49} ${sy} `+arc(x+49,sy, x+65,s(BL-19), x+81,sy)+T(x+81,17)+`L ${Math.min(x+185,800)} ${BL} `;
      x+=185;
    }
    return d;
  },

  nstemi: () => {
    // ST depression + inverted T
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      d+=P(x)+iso(x+18,18)+QRS(x+36,28,3,5);
      var sy=s(BL+12); d+=`L ${x+54} ${sy} L ${x+76} ${sy} `+T(x+76,13,true)+`L ${Math.min(x+184,800)} ${BL} `;
      x+=184;
    }
    return d;
  },

  pericardite: () => {
    // PR depression (Spodick) + concave (saddle) ST elevation everywhere
    let d=`M 0 ${BL}`, x=0;
    while(x<800){
      // PR depression
      d+=P(x,10)+`L ${x+18} ${s(BL+3)} L ${x+38} ${s(BL+3)} `+QRS(x+38,26,3,5);
      // Saddle-shape: concave ST
      var jx=x+56, jy=s(BL-11);

  { id:7, cat:"rythme", title:"BAV 2° Mobitz I (Wenckebach)", short:"Wenckebach", diff:"moyen", shape:"bav2m1", lead:"DII", answer:"BAV 2° Mobitz I (Wenckebach)", desc:"PR s'allonge progressivement jusqu'au blocage d'une P. Nœud AV. Bénin.", keys:["PR PROGRESSIVEMENT ALLONGÉ","P bloquée sans QRS","Groupes de battements","Nœud AV = bénin"], hint:"Le PR s'allonge-t-il avant le blocage ? Si oui : Wenckebach.", opts:["BAV 1°","BAV 2° Mobitz I","BAV 2° Mobitz II","BAV 3°"], ok:1 },
  { id:8, cat:"rythme", title:"BAV 2° Mobitz II", short:"Mobitz II", diff:"difficile", shape:"bav2m2", lead:"DII", answer:"BAV 2° Mobitz II", desc:"PR CONSTANT puis P soudainement bloquée. Infrahissien. GRAVE → stimulateur cardiaque.", keys:["PR CONSTANT","P bloquée sans allongement","Infrahissien","→ Stimulateur cardiaque"], hint:"PR CONSTANT avant le blocage (≠ Mobitz I). Soudain : pas de QRS.", opts:["BAV 1°","BAV 2° Mobitz I","BAV 2° Mobitz II","BAV 3°"], ok:2 },
  { id:9, cat:"rythme", title:"BAV 3° degré (complet)", short:"BAV3", diff:"difficile", shape:"bav3", lead:"DII", answer:"BAV 3° degré (complet)", desc:"Dissociation AV complète. P et QRS indépendants. Échappement ventriculaire 30-40/min. Urgence.", keys:["Dissociation AV complète","P régulières ET QRS réguliers mais INDÉPENDANTS","FC P > FC QRS","URGENCE → stimulateur"], hint:"P et QRS battent-ils indépendamment ? = dissociation AV totale.", opts:["BAV 2° Mobitz II","Rythme idioventriculaire","BAV 3°","Bloc sino-auriculaire"], ok:2 },
  { id:10, cat:"rythme", title:"Tachycardie Ventriculaire", short:"TV", diff:"difficile", shape:"vt", lead:"DII", answer:"Tachycardie Ventriculaire (TV)", desc:"QRS larges > 120ms, réguliers, FC 100-250/min. TV jusqu'à preuve du contraire !", keys:["QRS LARGES > 120ms réguliers","FC 140-220/min","Dissociation AV / captures / fusions","TV jusqu'à preuve du contraire !"], hint:"QRS larges + tachycardie = TV ! Ne jamais traiter comme TSV d'emblée.", opts:["TSV avec aberration","Flutter","FV","TV"], ok:3 },
  { id:11, cat:"rythme", title:"Fibrillation Ventriculaire", short:"FV", diff:"facile", shape:"vf", lead:"DII", answer:"Fibrillation Ventriculaire (FV)", desc:"Activité chaotique, sans QRS identifiable. ACR. → Choc électrique IMMÉDIAT !", keys:["Activité CHAOTIQUE sans QRS","Pas de pouls","ACR immédiat","→ Défibrillation immédiate !"], hint:"AUCUN QRS identifiable. Activité totalement chaotique. URGENCE ABSOLUE.", opts:["TV","Flutter ventriculaire","FV","Asystolie"], ok:2 },
  { id:12, cat:"rythme", title:"TSV (AVNRT/AVRT)", short:"TSV", diff:"moyen", shape:"svt", lead:"DII", answer:"Tachycardie Supraventriculaire (TSV)", desc:"QRS fins réguliers, FC 150-250/min. Début/fin brutaux. P rétrogrades dans le ST.", keys:["QRS FINS < 120ms","FC 170-220/min régulier","Début/fin BRUTAUX","P rétrograde dans le ST ou non visible"], hint:"QRS fins + tachycardie rapide. P rétrogrades après le QRS.", opts:["Tachycardie sinusale","Flutter 2:1","TV","TSV"], ok:3 },
  { id:13, cat:"rythme", title:"WPW (Pré-excitation)", short:"WPW", diff:"difficile", shape:"wpw", lead:"DI", answer:"Syndrome de WPW (pré-excitation)", desc:"PR court < 120ms, onde Delta, QRS large. Faisceau de Kent. Risque FV si FA.", keys:["PR COURT < 120ms","Onde DELTA (rampe initiale)","QRS LARGE > 120ms","T discordante — Risque FV si FA !"], hint:"PR court + onde delta + QRS large = WPW.", opts:["BBD","BAV 1°","WPW","Hyperkaliémie"], ok:2 },
  { id:14, cat:"rythme", title:"BBD (Bloc de Branche Droit)", short:"BBD", diff:"moyen", shape:"rbbb", lead:"V1", answer:"Bloc de Branche Droit (BBD)", desc:"QRS ≥ 120ms. RSR' en V1 (oreilles de lapin). S large en DI/V5/V6. T négative V1-V2.", keys:["QRS ≥ 120ms","RSR' en V1 (M shape)","S large en DI/V5/V6","T- V1-V2 (normale dans BBD)"], hint:"M en V1 et W en V6. RSR' en V1 = oreilles de lapin.", opts:["BBG","BBD","WPW","TV"], ok:1 },
  { id:15, cat:"rythme", title:"BBG (Bloc de Branche Gauche)", short:"BBG", diff:"difficile", shape:"lbbb", lead:"V6", answer:"Bloc de Branche Gauche (BBG)", desc:"QRS ≥ 120ms. R large encochée V5/V6/DI. QS en V1. T discordante. TOUJOURS pathologique.", keys:["QRS ≥ 120ms","R large encochée V5/V6/DI","QS ou rS en V1","T discordante OBLIGATOIRE — si concordante → Sgarbossa"], hint:"QRS large + R encochée V6 + QS en V1. T discordante obligatoire.", opts:["BBD","Hyperkaliémie","BBG","TV à complexes larges"], ok:2 },
  { id:16, cat:"rythme", title:"Rythme Jonctionnel", short:"Jonctionnel", diff:"difficile", shape:"jonctionnel", lead:"DII", answer:"Rythme Jonctionnel", desc:"Pacemaker nodal/hissien. FC 40-60/min, QRS fins. P rétrograde (inversée DII) ± présente.", keys:["FC 40-60/min","QRS fins","P rétrograde (négative DII/DIII/aVF)","P avant, dans, ou après le QRS"], hint:"QRS fins + FC lente + P invertée en DII = jonctionnel.", opts:["Bradycardie sinusale","BAV 3°","Rythme jonctionnel","Idioventriculaire"], ok:2 },
  { id:17, cat:"rythme", title:"Extrasystoles Ventriculaires", short:"ESV", diff:"moyen", shape:"extrasystoles_v", lead:"DII", answer:"Extrasystoles Ventriculaires (ESV)", desc:"QRS large prématuré, non précédé d'onde P. Pause compensatrice complète. Peut être isolées ou couplées.", keys:["QRS LARGE prématuré sans P","Pause compensatrice complète","Aspect bizarre","Souvent bénignes si cœur sain"], hint:"QRS large et prématuré, sans onde P précédente. Pause après.", opts:["ESV","ESA","TV","Conduite aberrante"], ok:0 },

  { id:20, cat:"rythme", title:"Trigéminisme Ventriculaire", short:"Trigéminisme V", diff:"moyen", shape:"trigeminisme", lead:"DII", answer:"Trigéminisme Ventriculaire", desc:"ESV toutes les 2 battements sinusaux. Pattern : normal - normal - ESV.", keys:["2 battements sinusaux : 1 ESV","Pattern régulier (3:1)","ESV large et prématurée","Causes : ischémie, hypokaliémie, digitale"], hint:"Pattern : 2 normaux puis 1 ESV large. Trigéminisme = toutes les 3.", opts:["Bigéminisme","Trigéminisme ventriculaire","ESA","Flutter"], ok:1 },
  { id:21, cat:"rythme", title:"Pacemaker (stimulateur cardiaque)", short:"Pacemaker VVI", diff:"moyen", shape:"pacemaker", lead:"DII", answer:"Rythme électro-entraîné (pacemaker)", desc:"Spicule électrique (spike) avant chaque QRS. QRS larges (stimulation ventriculaire). T discordante.", keys:["SPIKE (spicule) avant le QRS","QRS LARGE après le spike","T discordante","BBD-like si VVI"], hint:"Cherchez le spike (petite déflexion verticale) avant le QRS large.", opts:["BBG","TV","Pacemaker","Hyperkaliémie"], ok:2 },

  { id:23, cat:"rythme", title:"Maladie du Sinus", short:"Maladie du Sinus", diff:"difficile", shape:"maladie_sinus", lead:"DII", answer:"Maladie du Sinus (Sick Sinus Syndrome)", desc:"Dysfonction du nœud sinusal : bradycardie + pauses + possible tachycardie (syndrome brady-tachy).", keys:["Bradycardie sinusale","Pauses sinusales prolongées","Syndrome brady-tachy possible","→ Stimulateur cardiaque"], hint:"RR irréguliers avec pauses prolongées. Pas de dissociation AV.", opts:["BAV 3°","FA","Maladie du Sinus","Bloc SA 2°"], ok:2 },

  { id:26, cat:"rythme", title:"TV Polymorphe", short:"TV Polymorphe", diff:"difficile", shape:"tv_polymorphe", lead:"DII", answer:"TV Polymorphe (Torsades de Pointe)", desc:"TV avec QRS de morphologie et d'axe variables. Si sur fond de QT long = Torsades de Pointe.", keys:["QRS de morphologie VARIABLE","FC 200-250/min","Axe qui tourne (torsades)","Fond de QT long → Torsades de Pointe"], hint:"QRS larges de morphologies changeantes = TV polymorphe. QT long associé ?", opts:["TV monomorphe","FV","TV polymorphe / Torsades","Flutter ventriculaire"], ok:2 },

  { id:38, cat:"ischémie", title:"Ondes T négatives ischémiques", short:"T négatives", diff:"moyen", shape:"t_neg", lead:"V4-V6", answer:"Ondes T négatives ischémiques", desc:"T inversées symétriques et profondes dans un territoire vasculaire. Ischémie transmurale ou post-STEMI.", keys:["T inversées SYMÉTRIQUES et profondes","Dans un territoire vasculaire","Symétriques (≠ T- asym. normales)","Post-STEMI ou ischémie transmurale"], hint:"T négatives symétriques dans un territoire cohérent (V1-V4, ou inférieures).", opts:["T normales","BBG","T négatives ischémiques","Hyperkaliémie"], ok:2 },
  { id:39, cat:"ischémie", title:"Syndrome de De Winter", short:"De Winter", diff:"difficile", shape:"de_winter", lead:"V1-V6", answer:"Équivalent STEMI : Syndrome de De Winter", desc:"Sous-ST ≥ 1mm avec T amples et POSITIVES en V1-V6. Sous-décalage en point J avec T positive. Équivalent STEMI IVA. Urgence.", keys:["Sous-ST ≥ 1mm au J-point","T POSITIVES et amples après le sous-ST","Territoire V1-V6 (IVA)","ÉQUIVALENT STEMI → coronarographie urgente"], hint:"Sous-ST + T positives (pas négatives). Territoire antérieur = équivalent STEMI.", opts:["NSTEMI classique","Repolarisation précoce","De Winter (équivalent STEMI)","Hyperkaliémie"], ok:2 },
  { id:40, cat:"ischémie", title:"Syndrome de Wellens A", short:"Wellens A", diff:"difficile", shape:"wellens_a", lead:"V2-V3", answer:"Syndrome de Wellens (Type A - T biphasique)", desc:"T biphasique (d'abord positive puis négative) en V2-V3. Signe de lésion sévère de l'IVA. Risque STEMI imminent.", keys:["T BIPHASIQUE en V2-V3 (+ puis -)","Ischémie critique de l'IVA","PAS de sus-ST au moment de l'ECG","RISQUE STEMI imminent → coronarographie"], hint:"T biphasique en V2-V3 chez un patient qui vient d'avoir une douleur thoracique = Wellens.", opts:["NSTEMI","Repolarisation précoce","Wellens A (T biphasique)","Péricardite"], ok:2 },
  { id:41, cat:"ischémie", title:"Syndrome de Wellens B", short:"Wellens B", diff:"difficile", shape:"wellens_b", lead:"V2-V3", answer:"Syndrome de Wellens (Type B - T négative profonde)", desc:"T profondément négative et symétrique en V2-V3. Lésion sévère IVA. Plus fréquent (75%) que type A.", keys:["T NÉGATIVE PROFONDE et symétrique V2-V3","Plus fréquent (75% des Wellens)","IVA critique","→ Coronarographie urgente même sans douleur"], hint:"T profondément négative symétrique V2-V3 chez patient récemment douloureux = Wellens B.", opts:["NSTEMI","T négatives basales","Wellens B (T- profonde)","Péricardite"], ok:2 },

// ─── SPACED REPETITION ────────────────────────────────────────────────────────
var SR_KEY = "ecg_sr_v1";
var SR_INTERVALS = [0, 1, 3, 7, 14, 21];

function srLoad() {
  try { return JSON.parse(localStorage.getItem(SR_KEY) || "{}"); } catch(e) { return {}; }
}
function srSave(data) {
  try { localStorage.setItem(SR_KEY, JSON.stringify(data)); } catch(e) {}
}
function srUpdate(data, id, correct) {
  var now = Date.now();
  var e = data[id] || {level:0, attempts:0, correct:0};
  var next = {level:e.level, attempts:e.attempts+1, correct:e.correct+(correct?1:0)};
  next.level = correct ? Math.min(5, e.level+1) : Math.max(0, e.level-2);
  next.nextReview = now + SR_INTERVALS[next.level] * 86400000;
  var out = {};
  for(var k in data) out[k] = data[k];
  out[id] = next;
  return out;
}
function srQueue(cases, data) {
  var now = Date.now();
  var due=[], fresh=[], future=[];
  cases.forEach(function(c){
    if (!data[c.id]) fresh.push(c);
    else if (data[c.id].nextReview <= now) due.push(c);
    else future.push(c);
  });
  due.sort(function(a,b){ return ((data[a.id]&&data[a.id].level)||0)-((data[b.id]&&data[b.id].level)||0); });
  fresh.sort(function(){ return Math.random()-0.5; });
  future.sort(function(a,b){ return ((data[a.id]&&data[a.id].level)||0)-((data[b.id]&&data[b.id].level)||0); });
  return due.concat(fresh).concat(future);
}
function srStats(data, cases) {
  var mastered=0, learning=0, fresh=0, due=0;
  var byCat = {};
  var now = Date.now();
  cases.forEach(function(c) {
    if (!byCat[c.cat]) byCat[c.cat] = {attempts:0,correct:0,count:0,mastered:0,due:0};
    byCat[c.cat].count++;
    var e = data[c.id];
    if (!e) { fresh++; return; }
    if (e.level>=4) { mastered++; byCat[c.cat].mastered++; }
    else learning++;
    if (e.nextReview<=now) { due++; byCat[c.cat].due++; }
    byCat[c.cat].attempts += e.attempts;
    byCat[c.cat].correct  += e.correct;
  });
  return {mastered:mastered, learning:learning, fresh:fresh, due:due, total:cases.length, byCat:byCat};
}

function catAttr(k) {

    p.push('<div class="cat-stat-header">');

    p.push('</div>');
    p.push(sc!==null ? '<span style="font-size:22px;font-weight:900;color:'+scol+'">'+sc+'%</span>' : '<span style="color:#4a6888">—</span>');
    p.push('</div>');
    p.push('<div class="progress-bar" style="margin:8px 0 6px"><div style="height:100%;width:'+wPct+'%;background:'+col+';border-radius:3px;transition:width 0.6s"></div></div>');

    p.push('<span>✅ '+d.mastered+'/'+d.count+' maîtrisés</span>');

    if(d.attempts>0) p.push('<span>'+d.correct+'/'+d.attempts+' réponses</span>');
    p.push('</div></div>');
  });

  // Weak spots
  var weak = ALL_CASES.filter(function(c){
    return state.srData[c.id] && state.srData[c.id].attempts>=2 && state.srData[c.id].level<=1;
  }).sort(function(a,b){
    return ((state.srData[a.id]&&state.srData[a.id].level)||0)-((state.srData[b.id]&&state.srData[b.id].level)||0);
  }).slice(0,5);

  if (weak.length) {
    p.push('<div class="section-label" style="color:#ff3356;margin-top:16px">⚠ POINTS FAIBLES</div>');
    weak.forEach(function(c) {
      var e = state.srData[c.id];
      var pct = Math.round((e.correct/e.attempts)*100);
      p.push('<div class="weak-card">');
      p.push('<span style="font-size:14px">'+catIcon(c.cat)+'</span>');
      p.push('<div style="flex:1;min-width:0"><div style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+h(c.title)+'</div>');

      p.push('<div class="pct-circle">'+pct+'%</div>');
      p.push('</div>');
    });
  }

  if (st.total > st.fresh) {
    p.push('<div id="resetConfirm" style="margin-top:16px">');
    p.push('<button class="reset-btn" id="resetBtn">🔄 Réinitialiser la progression</button>');
    p.push('</div>');
  }
  p.push('</div>');
  return p.join('');
}

  p.push('<div class="ecg-box">');
  p.push('<span class="ecg-label">● 25mm/s · 10mm/mV</span>');
  p.push('<div class="strip-row">');
  p.push('<div class="lead-label">'+h(c.lead||'DII')+'</div>');
  p.push('<svg viewBox="0 0 800 120" class="strip-svg" preserveAspectRatio="none">');
  p.push('<defs><pattern id="g0" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0a1e2e" stroke-width="0.4"/></pattern></defs>');
  p.push('<rect width="800" height="120" fill="#091522"/>');
  p.push('<rect width="800" height="120" fill="url(#g0)"/>');
  p.push('<line x1="0" y1="60" x2="800" y2="60" stroke="#0a1e2e" stroke-width="0.8" stroke-dasharray="3,12"/>');
  p.push('<path d="'+ecgPath+'" fill="none" stroke="#00f090" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>');
  p.push('</svg></div></div>');

  p.push('<div class="question">Quel est ce diagnostic ECG ?</div>');
  p.push('<div class="opts">');
  (c.opts||[]).forEach(function(opt, idx) {
    var style, icon='';
    if (!state.showResult) {
      style = 'background:transparent;border:1px solid #122030;color:#d0e8ff';
    } else if (idx===c.ok) {
      style = 'background:#00f09018;border:1px solid #00f090;color:#00f090'; icon='✓';
    } else if (idx===state.selected) {
      style = 'background:#ff335618;border:1px solid #ff3356;color:#ff3356'; icon='✗';
    } else {
      style = 'background:transparent;border:1px solid #122030;color:#4a6888';
    }
    p.push('<button class="opt-btn" data-idx="'+idx+'" style="'+style+'">');
    p.push('<span class="opt-letter">'+String.fromCharCode(65+idx)+'</span>');
    p.push('<span style="flex:1">'+h(opt)+'</span>');
    if(icon) p.push('<span>'+icon+'</span>');
    p.push('</button>');
  });
  p.push('</div>');

  p.push('<div class="action-row">');
  if(!state.showResult) p.push('<button class="hint-btn" id="hintBtn">💡 '+(state.showHint?'Masquer':'Indice')+'</button>');
  if(state.showResult) p.push('<button class="keys-btn" id="keysBtn">🔍 '+(state.showKeys?'Masquer':'Critères')+'</button>');
  p.push('</div>');

  if(state.showHint && !state.showResult) {
    p.push('<div class="hint-box">💡 '+h(c.hint)+'</div>');
  }

  if(state.showResult) {
    var rCol = correct?'#00f090':'#ff3356';
    p.push('<div class="result-box" style="background:'+rCol+'18;border:1px solid '+rCol+'44">');
    p.push('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px">');
    p.push('<div style="font-weight:700;color:'+rCol+'">'+(correct?'✓ Correct !':'✗ C\'était : '+h(c.answer))+'</div>');
    if(e) {
      var newLv = srUpdate({},c.id,correct);
      // just show the direction
      p.push('<div style="font-size:9px;color:#4a6888">'+(correct?'↑ Niveau':'↓ Niveau')+'</div>');
    }
    p.push('</div>');
    p.push('<div style="font-size:11px;color:#4a6888;line-height:1.8">'+h(c.desc)+'</div>');
    p.push('</div>');
  }

  if(state.showKeys && state.showResult) {
    p.push('<div class="keys-box">');
    p.push('<div class="section-label" style="margin-bottom:8px;text-align:left">CRITÈRES DIAGNOSTIQUES</div>');
    (c.keys||[]).forEach(function(k){
      p.push('<div class="key-item"><span style="color:#00c8f8;flex-shrink:0">▸</span>'+h(k)+'</div>');
    });
    p.push('</div>');
  }

  if(state.showResult) {
    p.push('<button class="next-btn" id="nextBtn">'+(state.queue.length===0?'Voir les résultats →':'Cas suivant →')+'</button>');
  }

  p.push('</div></div>');
  return p.join('');
}

// ─── RESULT ───────────────────────────────────────────────────────────────────
function renderResult() {
  var pct = Math.round((state.score.ok/state.score.total)*100);
  var gc = pct>=80?"#00f090":pct>=60?"#ffc840":"#ff3356";
  var gt = pct>=80?"Expert !":pct>=60?"Bien joué":"À retravailler";
  var st = srStats(state.srData, ALL_CASES);
  var p = [];

  p.push('<div class="page result-page">');
  p.push('<div style="font-size:9px;letter-spacing:6px;color:#00c8f8;margin-bottom:12px">◈ SESSION TERMINÉE ◈</div>');
  p.push('<div style="font-size:68px;font-weight:900;color:'+gc+'">'+pct+'%</div>');
  p.push('<div style="font-size:18px;color:'+gc+';margin-bottom:4px">'+gt+'</div>');
  p.push('<div style="font-size:12px;color:#4a6888;margin-bottom:20px">'+state.score.ok+'/'+state.score.total+' bonnes réponses</div>');

  p.push('<div style="display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap;justify-content:center">');
  var res = [
    {n:state.score.ok, label:"Niveau ↑", col:"#00f090"},
    {n:state.score.total-state.score.ok, label:"À retravailler", col:"#ff3356"},
    {n:st.due, label:"Révisions dues", col:"#ffc840"}
  ];
  res.forEach(function(s){
    p.push('<div class="mini-stat" style="border-color:'+s.col+'33">');
    p.push('<div style="font-size:22px;font-weight:900;color:'+s.col+'">'+s.n+'</div>');
    p.push('<div style="font-size:9px;color:#4a6888">'+s.label+'</div>');
    p.push('</div>');
  });
  p.push('</div>');

  p.push('<div class="history-list">');
  state.history.forEach(function(item){
    var hc = item.ok?"#00f09040":"#ff335640";
    var tc = item.ok?"#00f090":"#ff3356";
    p.push('<div class="history-item" style="border-color:'+hc+'">');
    p.push('<span style="font-size:16px;color:'+tc+'">'+(item.ok?'✓':'✗')+'</span>');
    p.push('<div style="flex:1;min-width:0">');
    p.push('<div style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+h(item.case.title)+'</div>');
    if(!item.ok) p.push('<div style="font-size:9px;color:#4a6888">→ '+h(item.case.answer)+'</div>');
    p.push('</div>');
    p.push('<div style="font-size:10px;color:'+catColor(item.case.cat)+';flex-shrink:0">'+catIcon(item.case.cat)+'</div>');
    p.push('</div>');
  });
  p.push('</div>');

  p.push('<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">');
  p.push('<button class="btn-outline-accent" id="statsBtn">📊 Stats</button>');
  p.push('<button class="btn-outline-dim" id="homeBtn">← Accueil</button>');
  p.push('<button class="btn-primary" id="replayBtn">↺ Continuer</button>');
  p.push('</div></div>');
  return p.join('');
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.onclick = function(){ state.tab = btn.dataset.tab; render(); };
  });
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.onclick = function(){ state.filter = btn.dataset.filter; render(); };
  });
  var el;
  el = document.getElementById('modeToggle');
  if(el) el.onclick = function(){ state.srMode = !state.srMode; render(); };
  el = document.getElementById('startBtn');
  if(el) el.onclick = startQuiz;
  el = document.getElementById('backBtn');
  if(el) el.onclick = function(){ state.screen='home'; render(); };
  document.querySelectorAll('.opt-btn').forEach(function(btn){
    btn.onclick = function(){ answer(parseInt(btn.dataset.idx)); };
  });
  el = document.getElementById('hintBtn');
  if(el) el.onclick = function(){ state.showHint = !state.showHint; render(); };
  el = document.getElementById('keysBtn');
  if(el) el.onclick = function(){ state.showKeys = !state.showKeys; render(); };
  el = document.getElementById('nextBtn');
  if(el) el.onclick = next;
  el = document.getElementById('statsBtn');
  if(el) el.onclick = function(){ state.screen='home'; state.tab='stats'; render(); };
  el = document.getElementById('homeBtn');
  if(el) el.onclick = function(){ state.screen='home'; render(); };
  el = document.getElementById('replayBtn');
  if(el) el.onclick = startQuiz;
  el = document.getElementById('resetBtn');
  if(el) el.onclick = function(){
    var div = document.getElementById('resetConfirm');
    div.innerHTML = '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span style="font-size:10px;color:#ff3356">Tout effacer ?</span><button id="confirmYes" style="padding:4px 12px;background:#ff335522;border:1px solid #ff3356;border-radius:14px;color:#ff3356;cursor:pointer;font-family:inherit;font-size:10px">Oui</button><button id="confirmNo" style="padding:4px 12px;background:transparent;border:1px solid #4a688844;border-radius:14px;color:#4a6888;cursor:pointer;font-family:inherit;font-size:10px">Annuler</button></div>';
    document.getElementById('confirmYes').onclick = function(){ state.srData={}; srSave({}); render(); };
    document.getElementById('confirmNo').onclick = function(){ render(); };
  };
}

// ─── QUIZ ACTIONS ─────────────────────────────────────────────────────────────
function startQuiz() {
  var filtered = getFiltered();
  var pool = state.srMode ? srQueue(filtered, state.srData) : filtered.slice().sort(function(){ return Math.random()-0.5; });
  if (!pool.length) return;
  state.current = pool[0];
  state.queue = pool.slice(1);
  state.selected = null;
  state.showResult = false;
  state.showHint = false;
  state.showKeys = false;
  state.score = {ok:0, total:0};
  state.history = [];
  state.screen = 'quiz';
  render();
}

function answer(idx) {
  if (state.showResult) return;
  var ok = idx === state.current.ok;
  state.selected = idx;
  state.showResult = true;
  if(ok) state.score.ok++;
  state.score.total++;
  state.history.push({case: state.current, idx:idx, ok:ok});
  state.srData = srUpdate(state.srData, state.current.id, ok);
  srSave(state.srData);
  render();
}

function next() {
  if (!state.queue.length) { state.screen='result'; render(); return; }
  state.current = state.queue[0];
  state.queue = state.queue.slice(1);
  state.selected = null;
  state.showResult = false;
  state.showHint = false;
  state.showKeys = false;
  render();
}

render();

  </script>
</body>
